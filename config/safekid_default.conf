# ================================================================
#  SafeKid Flash — Default Configuration
#  File: config/safekid_default.conf
#
#  Format: INI (Python configparser compatible)
#  Copy file ini ke safekid.conf dan sesuaikan.
# ================================================================

[general]
# Nama anak (digunakan di UI dan log)
child_name = Budi (Config)

# Usia anak (menentukan preset kategori yang diblokir)
child_age = 10


# Port untuk kid launcher UI
launcher_port = 5556

# Admin PIN Hash (SHA256 dari "1234")
# Gunakan --setup untuk mengubah.
admin_pin_hash = 03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4

# Bahasa antarmuka: id (Indonesia), en (English)
language = id

# Mode debug (True = verbose logging)
debug = False


# ================================================================
[time_limits]
# ================================================================
# Batas waktu dalam menit per hari

# Senin s.d. Jumat (hari sekolah)
weekday_limit_minutes = 60

# Sabtu & Minggu (akhir pekan)
weekend_limit_minutes = 120

# Apakah batas waktu berbeda per hari?
# True = gunakan pengaturan per hari di bawah
per_day_override = False

# Override per hari (aktif jika per_day_override = True)
monday_minutes    = 60
tuesday_minutes   = 60
wednesday_minutes = 60
thursday_minutes  = 60
friday_minutes    = 90
saturday_minutes  = 120
sunday_minutes    = 120

# Waktu paling awal boleh mulai (format HH:MM, 00:00 = tanpa batas)
earliest_start = 07:00

# Waktu paling akhir (komputer otomatis kunci setelah jam ini)
latest_end = 21:00

# Menit peringatan sebelum waktu habis
warning_before_end_minutes = 10

# Bonus waktu untuk hari tanpa pelanggaran (menit)
streak_bonus_minutes = 10


# ================================================================
[content_filter]
# ================================================================
# Apakah content filtering diaktifkan?
enabled = True

# Provider DNS yang digunakan:
#   opendns_family     — OpenDNS FamilyShield (rekomendasi)
#   cloudflare_family  — Cloudflare for Families
#   cleanbrowsing_family — CleanBrowsing (paling ketat)
#   quad9              — Quad9 (hanya malware)
#   custom             — Gunakan custom_dns_primary / secondary
dns_provider = opendns_family

# DNS kustom (digunakan jika dns_provider = custom)
custom_dns_primary   = 208.67.222.123
custom_dns_secondary = 208.67.220.123

# Kategori yang diblokir (comma-separated):
#   adult, gambling, violence, malware, phishing, ads, social_media, online_games
block_categories = adult, gambling, violence, malware, phishing

# Update blocklist otomatis (setiap berapa hari)
blocklist_update_days = 7

# Aktifkan Squid proxy untuk HTTPS filtering
squid_enabled = False
squid_port    = 3128

# Paksa SafeSearch di Google, YouTube, Bing
force_safe_search = True


# ================================================================
[ui]
# ================================================================
# Tema warna launcher: space (default), ocean, forest, candy
theme = space

# Tampilkan timer countdown
show_timer = True

# Tampilkan statistik (bintang, hari berturut)
show_stats = True

# Tampilkan kutipan motivasi
show_quotes = True

# Sumber quotes (id = Indonesia, en = English)
quotes_lang = id

# Kiosk mode: sembunyikan taskbar & kunci ke launcher
kiosk_mode = False

# Resolusi layar target (untuk kiosk mode)
kiosk_width  = 1280
kiosk_height = 720


# ================================================================
[apps]
# ================================================================
# Path ke file katalog aplikasi
catalog_file = safekid/apps/apps_catalog.json

# Aplikasi yang diizinkan (comma-separated ID dari catalog)
# Kosongkan = semua yang enabled di catalog
allowed_apps =

# Aplikasi yang diblokir paksa (override catalog)
blocked_apps =

# Maksimal menit per aplikasi per hari (0 = tidak dibatasi)
max_minutes_per_app = 0

# Rekam log aktivitas aplikasi
log_app_activity = True


# ================================================================
[little_brother]
# ================================================================
# Apakah menggunakan Little Brother sebagai backend?
enabled = False

# URL server Little Brother
server_url = http://localhost:5555

# Username & password admin Little Brother
username =
password =

# Interval sinkronisasi data (detik)
sync_interval_seconds = 60


# ================================================================
[notifications]
# ================================================================
# Notifikasi desktop saat waktu hampir habis
desktop_notifications = True

# Notifikasi email ke orang tua
email_enabled = False
email_to      =
email_smtp    = smtp.gmail.com
email_port    = 587
email_user    =
email_pass    =

# Notifikasi webhook (Telegram, Discord, dll)
webhook_enabled = False
webhook_url     =


# ================================================================
[live_usb]
# ================================================================
# Konfigurasi untuk mode Live USB Boot

# Nama label USB drive
usb_label = SafeKid Flash

# Aktifkan persistence (simpan file antar sesi boot)
persistence = True
persistence_size_mb = 2048

# Username default untuk sesi live
live_username = safekid
live_hostname = safekid-flash

# Auto-login tanpa password
auto_login = True

# Jalankan launcher otomatis saat desktop muncul
autostart_launcher = True
